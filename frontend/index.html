<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Progressive Video Downloader Home</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7f13ec",
                        "background-light": "#f7f6f8",
                        "background-dark": "#191022",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <link rel="stylesheet" href="/src/style.css" />
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col overflow-x-hidden">
    <div class="flex-1 flex flex-col relative pb-20">
        <!-- Background decorative elements -->
        <div
            class="absolute top-[-10%] left-[-20%] w-[80%] h-[40%] bg-primary/20 rounded-full blur-[120px] pointer-events-none">
        </div>
        <div
            class="absolute bottom-[20%] right-[-10%] w-[60%] h-[30%] bg-primary/10 rounded-full blur-[100px] pointer-events-none">
        </div>

        <!-- Header -->
        <header class="flex items-center justify-between p-6 z-10">
            <div class="flex items-center gap-2">
                <div class="bg-primary p-2 rounded-lg">
                    <span class="material-symbols-outlined text-white">play_circle</span>
                </div>
                <h1 class="text-xl font-bold tracking-tight">ProDownloader</h1>
            </div>
            <button
                class="w-10 h-10 flex items-center justify-center rounded-full bg-primary/10 border border-primary/20">
                <span class="material-symbols-outlined text-primary">person</span>
            </button>
        </header>

        <!-- Main Content -->
        <main class="flex-1 px-6 flex flex-col items-center justify-center gap-6 z-10">
            <div class="text-center space-y-2">
                <h2
                    class="text-4xl font-bold leading-tight bg-gradient-to-r from-white to-primary/60 bg-clip-text text-transparent">
                    Progressive Downloader
                </h2>
                <p class="text-slate-400 max-w-[280px] mx-auto">Paste the Download Link of the Video and Watch as you
                    Download.</p>
            </div>

            <!-- Glassmorphic Search Card -->
            <div class="w-full glass-card rounded-3xl p-6 space-y-4 shadow-2xl">
                <div class="relative glow-input transition-all duration-300 rounded-xl overflow-hidden">
                    <div class="absolute left-4 top-1/2 -translate-y-1/2">
                        <span class="material-symbols-outlined text-primary/60">link</span>
                    </div>
                    <input id="urlInput"
                        class="w-full bg-slate-900/40 border-none pl-12 pr-4 py-4 text-slate-100 placeholder:text-slate-500 focus:ring-1 focus:ring-primary/50 outline-none transition-all"
                        placeholder="Paste video URL here..." type="text" />
                </div>

                <button id="analyzeBtn"
                    class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 transition-transform active:scale-95 shadow-lg shadow-primary/20">
                    <span class="material-symbols-outlined">analytics</span>
                    Analyze Link
                </button>

                <!-- Hidden Metadata Section -->
                <div id="metadataContainer" class="hidden grid grid-cols-2 gap-3 pt-2 opacity-90 transition-all">
                    <div class="bg-slate-900/30 rounded-lg p-3 border border-white/5">
                        <p class="text-[10px] uppercase tracking-wider text-slate-500 font-bold">File Size</p>
                        <p id="fileSize" class="text-sm font-medium">-- MB</p>
                    </div>
                    <div class="bg-slate-900/30 rounded-lg p-3 border border-white/5">
                        <p class="text-[10px] uppercase tracking-wider text-slate-500 font-bold">Format</p>
                        <p id="fileFormat" class="text-sm font-medium">Auto Detect</p>
                    </div>
                </div>

                <!-- Hidden Watch & Download Button -->
                <button id="watchDownloadBtn"
                    class="hidden w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 transition-transform active:scale-95 shadow-lg shadow-blue-600/20">
                    <span class="material-symbols-outlined">play_circle</span>
                    Watch & Download
                </button>
            </div>

            <!-- Hidden Preview/Player Section -->
            <div id="videoContainer"
                class="hidden w-full glass-card rounded-2xl p-4 border border-primary/30 min-h-[180px] flex flex-col items-center justify-center gap-4 group">
                <video id="videoPlayer" class="w-full rounded-xl" controls autoplay></video>
            </div>
        </main>
    </div>

    <!-- Bottom Navigation Bar -->
    <nav
        class="fixed bottom-0 left-0 right-0 z-50 border-t border-primary/10 bg-background-dark/80 backdrop-blur-lg px-4 pb-6 pt-3">
        <div class="flex gap-2 max-w-md mx-auto">
            <a class="flex flex-1 flex-col items-center justify-end gap-1 text-primary" href="#">
                <div class="flex h-8 items-center justify-center">
                    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">home</span>
                </div>
                <p class="text-[10px] font-bold leading-normal tracking-wide">Home</p>
            </a>
            <a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-500" href="#">
                <div class="flex h-8 items-center justify-center">
                    <span class="material-symbols-outlined">download_for_offline</span>
                </div>
                <p class="text-[10px] font-medium leading-normal tracking-wide">Downloads</p>
            </a>
            <a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-500" href="#">
                <div class="flex h-8 items-center justify-center">
                    <span class="material-symbols-outlined">history</span>
                </div>
                <p class="text-[10px] font-medium leading-normal tracking-wide">Recent</p>
            </a>
            <a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-500" href="#">
                <div class="flex h-8 items-center justify-center">
                    <span class="material-symbols-outlined">settings</span>
                </div>
                <p class="text-[10px] font-medium leading-normal tracking-wide">Settings</p>
            </a>
        </div>
    </nav>

    <!-- App Logic -->
    <script type="module" src="/src/app.js"></script>
</body>

</html>
